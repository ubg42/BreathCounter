<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Breath Time Calculator</title>
<style>
    body {
        font-family: Arial;
        text-align: center;
        background: #111;
        color: white;
        padding: 30px;
    }
    input, button {
        padding: 10px;
        margin: 10px;
        font-size: 16px;
    }
    .result {
        margin-top: 20px;
        font-size: 18px;
    }
</style>
</head>
<body>

<h1>Breath Time Calculator</h1>

<p>Enter your birth date & breath number:</p>

<input type="date" id="birth">
<br>
<input type="number" id="breath" placeholder="Breath number">
<br>
<button onclick="calculate()">Calculate</button>

<div class="result" id="output"></div>

<script>
function formatDate(date) {
    const day = String(date.getDate()).padStart(2, '0');
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const year = date.getFullYear();

    const hours = String(date.getHours()).padStart(2, '0');
    const minutes = String(date.getMinutes()).padStart(2, '0');
    const seconds = String(date.getSeconds()).padStart(2, '0');

    return `${day}/${month}/${year} ${hours}:${minutes}:${seconds}`;
}

function calculate() {
    const birthInput = document.getElementById("birth").value;
    const breathNumber = parseInt(document.getElementById("breath").value);

    if (!birthInput || !breathNumber) {
        document.getElementById("output").innerHTML = "Please fill in both fields.";
        return;
    }

    const birthDate = new Date(birthInput + "T00:00:00");

    const breathsPerMinute = 12;

    const minutesPassed = breathNumber / breathsPerMinute;
    const timePassedMs = minutesPassed * 60 * 1000;

    const resultDate = new Date(birthDate.getTime() + timePassedMs);

    const formatted = formatDate(resultDate);

    document.getElementById("output").innerHTML = `
        <b>This person took their ${breathNumber.toLocaleString()}th breath at ${formatted}.</b>
    `;
}
</script>

</body>
</html>
