<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #2c2c2c, #1a1a1a);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: #2f2f2f;
  padding: 40px;
  border-radius: 10px;
  width: 300px;
  text-align: center;
}

h2 {
  color: white;
}

/* inputs */
input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: none;
  border-radius: 5px;
  background: #1f1f1f;
  color: white;
  box-sizing: border-box;
}

/* container */
.pass-container {
  margin-bottom: 10px;
}

/* 👁 button */
.eye-btn {
  width: 100%;
  padding: 10px;
  background: #444;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  position: relative;
  display: flex;
  justify-content: center; /* center horizontally */
  align-items: center;     /* center vertically */
  transition: 0.3s;
}

.eye-btn:hover {
  background: #555;
}

/* eye icon */
.eye {
  width: 20px;
  height: 20px;
  border: 2px solid white;
  border-radius: 50%;
  position: relative;
}

/* pupil */
.eye::before {
  content: "";
  position: absolute;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  top: 5px;
  left: 5px;
}

/* cross */
.eye::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 2px;
  background: red;
  top: 50%;
  left: 0;
  transform: rotate(45deg);
  opacity: 0;
  transition: 0.3s;
}

/* active state */
.eye-btn.active .eye::after {
  opacity: 1;
}

/* login button */
button.login {
  width: 100%;
  padding: 10px;
  background: #4caf50;
  border: none;
  color: white;
  border-radius: 5px;
  cursor: pointer;
  margin-top: 15px;
}

button.login:hover {
  background: #45a049;
}
</style>

</head>
<body>

<div class="login-box">
  <h2>Login</h2>

  <input type="text" id="user" placeholder="Username">

  <div class="pass-container">
    <input type="password" id="pass" placeholder="Password">

    <!-- 👁 button BELOW -->
    <button class="eye-btn" onclick="togglePassword()">
      <div class="eye"></div>
    </button>
  </div>

  <button class="login" onclick="checkLogin()">LOGIN</button>
</div>

<script>
function togglePassword() {
  const pass = document.getElementById("pass");
  const btn = document.querySelector(".eye-btn");

  if (pass.type === "password") {
    pass.type = "text";
    btn.classList.add("active");
  } else {
    pass.type = "password";
    btn.classList.remove("active");
  }
}

async function hash(text) {
  const data = new TextEncoder().encode(text);
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(hashBuffer))
    .map(b => b.toString(16).padStart(2, "0"))
    .join("");
}

async function checkLogin() {
  const u = document.getElementById("user").value;
  const p = document.getElementById("pass").value;

  const userHash = await hash(u);
  const passHash = await hash(p);

  if (
    userHash === "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918" &&
    passHash === "6679d8daf982939b6e0221517d5015100a042c254ea143fef1641918efb545b4"
  ) {
    window.location.href = "https://ubg42.github.io";
  } else {
    alert("Wrong login!");
  }
}
</script>

</body>
</html>
